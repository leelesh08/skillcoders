name: Server tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Run server tests (Jest)
        run: |
          cd server
          npm test
